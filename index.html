<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoteVault - Student Notes Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            color: white;
        }

        header h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-top: 30px;
        }

        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
            header h1 {
                font-size: 2rem;
            }
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .card h2 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #667eea;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .icon {
            width: 30px;
            height: 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        input, select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        .file-input-wrapper {
            position: relative;
            border: 3px dashed #667eea;
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #f8f9ff;
        }

        .file-input-wrapper:hover {
            background: #eef0ff;
            border-color: #764ba2;
        }

        .file-input-wrapper input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .file-input-text {
            color: #667eea;
            font-weight: 600;
        }

        .file-input-subtext {
            color: #888;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-family: inherit;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            margin-top: 15px;
            overflow: hidden;
            display: none;
        }

        .progress-bar.active {
            display: block;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s;
            border-radius: 4px;
        }

        .message {
            padding: 12px 16px;
            border-radius: 10px;
            margin-top: 15px;
            display: none;
            font-weight: 500;
        }

        .message.success {
            display: block;
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            display: block;
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .files-list {
            max-height: 500px;
            overflow-y: auto;
        }

        .file-item {
            display: flex;
            align-items: center;
            padding: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            margin-bottom: 12px;
            transition: all 0.2s;
            background: #fafafa;
        }

        .file-item:hover {
            background: #f0f0ff;
            border-color: #667eea;
            transform: translateX(5px);
        }

        .file-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.3rem;
            margin-right: 15px;
            flex-shrink: 0;
        }

        .file-info {
            flex: 1;
            min-width: 0;
        }

        .file-name {
            font-weight: 600;
            color: #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-meta {
            font-size: 0.85rem;
            color: #888;
            margin-top: 3px;
        }

        .file-actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .btn-small {
            padding: 8px 14px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn-download {
            background: #667eea;
            color: white;
        }

        .btn-download:hover {
            background: #5a6fd6;
        }

        .btn-delete {
            background: #ff6b6b;
            color: white;
        }

        .btn-delete:hover {
            background: #ee5a5a;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .filter-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
            font-family: inherit;
        }

        .filter-btn.active, .filter-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e0e0e0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-box {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .stat-label {
            font-size: 0.85rem;
            opacity: 0.9;
        }

        .subject-tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: 5px;
        }

        .tag-math { background: #e3f2fd; color: #1565c0; }
        .tag-science { background: #e8f5e9; color: #2e7d32; }
        .tag-history { background: #fff3e0; color: #e65100; }
        .tag-english { background: #fce4ec; color: #c62828; }
        .tag-physics { background: #f3e5f5; color: #6a1b9a; }
        .tag-chemistry { background: #e0f2f1; color: #00695c; }
        .tag-biology { background: #e8eaf6; color: #283593; }
        .tag-other { background: #f5f5f5; color: #616161; }

        footer {
            text-align: center;
            padding: 30px;
            color: white;
            opacity: 0.8;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 NoteVault</h1>
            <p>Student Notes & Exam Papers Hub</p>
        </header>

        <div class="main-grid">
            <!-- Upload Section -->
            <div class="card">
                <h2><span class="icon">⬆️</span> Upload Files</h2>
                
                <div class="form-group">
                    <label>Your Name</label>
                    <input type="text" id="uploaderName" placeholder="Enter your name" required>
                </div>

                <div class="form-group">
                    <label>Subject</label>
                    <select id="subject" required>
                        <option value="">Select subject...</option>
                        <option value="Math">Mathematics</option>
                        <option value="Science">General Science</option>
                        <option value="Physics">Physics</option>
                        <option value="Chemistry">Chemistry</option>
                        <option value="Biology">Biology</option>
                        <option value="History">History</option>
                        <option value="English">English</option>
                        <option value="Geography">Geography</option>
                        <option value="Computer Science">Computer Science</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>File Type</label>
                    <select id="fileType" required>
                        <option value="">Select type...</option>
                        <option value="Notes">Class Notes</option>
                        <option value="Exam Paper">Exam Paper</option>
                        <option value="Assignment">Assignment</option>
                        <option value="Study Guide">Study Guide</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Description (optional)</label>
                    <input type="text" id="description" placeholder="e.g., Grade 12 Final Exam 2025">
                </div>

                <div class="form-group">
                    <label>Choose File</label>
                    <div class="file-input-wrapper" id="dropZone">
                        <input type="file" id="fileInput" accept=".pdf,.doc,.docx,.ppt,.pptx,.txt,.jpg,.jpeg,.png">
                        <div class="file-input-text">📁 Click or drag file here</div>
                        <div class="file-input-subtext">PDF, Word, PowerPoint, Images (max 50MB)</div>
                    </div>
                    <div id="fileName" style="margin-top:10px;color:#667eea;font-weight:600;"></div>
                </div>

                <button class="btn" id="uploadBtn" onclick="uploadFile()">Upload File</button>
                
                <div class="progress-bar" id="progressBar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                
                <div class="message" id="message"></div>
            </div>

            <!-- Browse Section -->
            <div class="card">
                <h2><span class="icon">📂</span> Browse Files</h2>
                
                <div class="stats" id="stats">
                    <div class="stat-box">
                        <div class="stat-number" id="totalFiles">0</div>
                        <div class="stat-label">Files</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number" id="totalSubjects">0</div>
                        <div class="stat-label">Subjects</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number" id="totalUploaders">0</div>
                        <div class="stat-label">Students</div>
                    </div>
                </div>

                <div class="filter-bar">
                    <button class="filter-btn active" onclick="filterFiles('all')">All</button>
                    <button class="filter-btn" onclick="filterFiles('Math')">Math</button>
                    <button class="filter-btn" onclick="filterFiles('Science')">Science</button>
                    <button class="filter-btn" onclick="filterFiles('Physics')">Physics</button>
                    <button class="filter-btn" onclick="filterFiles('Chemistry')">Chemistry</button>
                    <button class="filter-btn" onclick="filterFiles('Biology')">Biology</button>
                    <button class="filter-btn" onclick="filterFiles('History')">History</button>
                    <button class="filter-btn" onclick="filterFiles('English')">English</button>
                </div>

                <div class="files-list" id="filesList">
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Loading files...</p>
                    </div>
                </div>
            </div>
        </div>

        <footer>
            <p>Made with ❤️ for students everywhere | NoteVault 2026</p>
        </footer>
    </div>

    <script>
        // Supabase configuration
        const SUPABASE_URL = 'https://zczaqgdwyoiypptjjbtz.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_j8gUFsqcs3Ulat6O0vWdhg_5fiyJniF';
        const BUCKET_NAME = 'student-notes';

        // Initialize Supabase
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allFiles = [];
        let currentFilter = 'all';

        // File input handler
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                document.getElementById('fileName').textContent = `Selected: ${file.name}`;
            }
        });

        // Drag and drop
        const dropZone = document.getElementById('dropZone');
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.style.background = '#eef0ff';
        });
        dropZone.addEventListener('dragleave', () => {
            dropZone.style.background = '#f8f9ff';
        });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.background = '#f8f9ff';
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                document.getElementById('fileInput').files = files;
                document.getElementById('fileName').textContent = `Selected: ${files[0].name}`;
            }
        });

        // Upload function
        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const uploaderName = document.getElementById('uploaderName').value.trim();
            const subject = document.getElementById('subject').value;
            const fileType = document.getElementById('fileType').value;
            const description = document.getElementById('description').value.trim();
            const file = fileInput.files[0];

            // Validation
            if (!uploaderName) {
                showMessage('Please enter your name', 'error');
                return;
            }
            if (!subject) {
                showMessage('Please select a subject', 'error');
                return;
            }
            if (!fileType) {
                showMessage('Please select a file type', 'error');
                return;
            }
            if (!file) {
                showMessage('Please select a file', 'error');
                return;
            }

            const uploadBtn = document.getElementById('uploadBtn');
            const progressBar = document.getElementById('progressBar');
            const progressFill = document.getElementById('progressFill');
            
            uploadBtn.disabled = true;
            uploadBtn.textContent = 'Uploading...';
            progressBar.classList.add('active');

            try {
                // Create unique filename
                const timestamp = Date.now();
                const safeName = file.name.replace(/[^a-zA-Z0-9.-]/g, '_');
                const filePath = `${subject}/${timestamp}_${safeName}`;

                // Simulate progress
                let progress = 0;
                const progressInterval = setInterval(() => {
                    progress += 10;
                    if (progress <= 90) {
                        progressFill.style.width = progress + '%';
                    }
                }, 200);

                // Upload to Supabase Storage
                const { data, error } = await supabase.storage
                    .from(BUCKET_NAME)
                    .upload(filePath, file, {
                        cacheControl: '3600',
                        upsert: false
                    });

                clearInterval(progressInterval);

                if (error) throw error;

                progressFill.style.width = '100%';

                // Get public URL
                const { data: { publicUrl } } = supabase.storage
                    .from(BUCKET_NAME)
                    .getPublicUrl(filePath);

                // Save metadata to database (using a simple approach with storage metadata)
                const metadata = {
                    uploaderName,
                    subject,
                    fileType,
                    description,
                    originalName: file.name,
                    filePath,
                    publicUrl,
                    uploadedAt: new Date().toISOString(),
                    fileSize: formatFileSize(file.size)
                };

                // Store metadata in a JSON file for simplicity
                const metadataPath = `metadata/${timestamp}_${safeName}.json`;
                const metadataBlob = new Blob([JSON.stringify(metadata)], { type: 'application/json' });
                
                await supabase.storage
                    .from(BUCKET_NAME)
                    .upload(metadataPath, metadataBlob, {
                        cacheControl: '3600',
                        upsert: false
                    });

                showMessage('✅ File uploaded successfully!', 'success');
                
                // Reset form
                fileInput.value = '';
                document.getElementById('fileName').textContent = '';
                document.getElementById('uploaderName').value = '';
                document.getElementById('subject').value = '';
                document.getElementById('fileType').value = '';
                document.getElementById('description').value = '';
                
                // Refresh file list
                setTimeout(() => {
                    loadFiles();
                }, 1000);

            } catch (error) {
                console.error('Upload error:', error);
                showMessage('❌ Upload failed: ' + error.message, 'error');
            } finally {
                uploadBtn.disabled = false;
                uploadBtn.textContent = 'Upload File';
                setTimeout(() => {
                    progressBar.classList.remove('active');
                    progressFill.style.width = '0%';
                }, 1000);
            }
        }

        // Load files from storage
        async function loadFiles() {
            const filesList = document.getElementById('filesList');
            filesList.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading files...</p>
                </div>
            `;

            try {
                // List all files in metadata folder
                const { data: metadataFiles, error: listError } = await supabase.storage
                    .from(BUCKET_NAME)
                    .list('metadata', {
                        limit: 100,
                        offset: 0,
                        sortBy: { column: 'created_at', order: 'desc' }
                    });

                if (listError) throw listError;

                if (!metadataFiles || metadataFiles.length === 0) {
                    filesList.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📭</div>
                            <p>No files yet. Be the first to upload!</p>
                        </div>
                    `;
                    updateStats([], []);
                    return;
                }

                // Fetch metadata for each file
                const filesData = [];
                for (const file of metadataFiles) {
                    if (!file.name.endsWith('.json')) continue;
                    
                    const { data: fileData, error: downloadError } = await supabase.storage
                        .from(BUCKET_NAME)
                        .download(`metadata/${file.name}`);
                    
                    if (downloadError) continue;
                    
                    const text = await fileData.text();
                    const metadata = JSON.parse(text);
                    filesData.push(metadata);
                }

                allFiles = filesData;
                displayFiles(filesData);
                updateStats(filesData);

            } catch (error) {
                console.error('Load error:', error);
                filesList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⚠️</div>
                        <p>Error loading files. Please refresh.</p>
                    </div>
                `;
            }
        }

        // Display files
        function displayFiles(files) {
            const filesList = document.getElementById('filesList');
            
            const filtered = currentFilter === 'all' 
                ? files 
                : files.filter(f => f.subject === currentFilter);

            if (filtered.length === 0) {
                filesList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🔍</div>
                        <p>No files in this category yet.</p>
                    </div>
                `;
                return;
            }

            filesList.innerHTML = filtered.map(file => `
                <div class="file-item">
                    <div class="file-icon">${getFileIcon(file.fileType)}</div>
                    <div class="file-info">
                        <div class="file-name">${escapeHtml(file.originalName)}</div>
                        <div class="file-meta">
                            by ${escapeHtml(file.uploaderName)} • ${file.fileSize} • ${formatDate(file.uploadedAt)}
                            ${file.description ? ` • ${escapeHtml(file.description)}` : ''}
                        </div>
                        <span class="subject-tag tag-${file.subject.toLowerCase().replace(' ', '-')}">${file.subject}</span>
                        <span class="subject-tag tag-other">${file.fileType}</span>
                    </div>
                    <div class="file-actions">
                        <button class="btn-small btn-download" onclick="downloadFile('${file.publicUrl}', '${escapeHtml(file.originalName)}')">⬇️ Download</button>
                    </div>
                </div>
            `).join('');
        }

        // Filter files
        function filterFiles(subject) {
            currentFilter = subject;
            
            // Update active button
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent === subject || (subject === 'all' && btn.textContent === 'All')) {
                    btn.classList.add('active');
                }
            });
            
            displayFiles(allFiles);
        }

        // Download file
        function downloadFile(url, filename) {
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        // Update statistics
        function updateStats(files) {
            document.getElementById('totalFiles').textContent = files.length;
            
            const subjects = new Set(files.map(f => f.subject));
            document.getElementById('totalSubjects').textContent = subjects.size;
            
            const uploaders = new Set(files.map(f => f.uploaderName));
            document.getElementById('totalUploaders').textContent = uploaders.size;
        }

        // Helper functions
        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message ${type}`;
            setTimeout(() => {
                msg.className = 'message';
            }, 5000);
        }

        function getFileIcon(type) {
            const icons = {
                'Notes': '📝',
                'Exam Paper': '📄',
                'Assignment': '📋',
                'Study Guide': '📖',
                'Other': '📎'
            };
            return icons[type] || '📎';
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', { 
                month: 'short', 
                day: 'numeric', 
                year: 'numeric' 
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Load files on page load
        window.addEventListener('DOMContentLoaded', loadFiles);
    </script>
</body>
</html>
